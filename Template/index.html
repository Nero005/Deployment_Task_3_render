<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #4a90e2; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #357abd; }
        .entry { border-bottom: 1px solid #eee; padding: 12px 0; }
        .entry strong { color: #333; }
        .entry small { color: #999; }
    </style>
</head>
<body>
    <h1>Guestbook</h1>

    <form action="/submit" method="POST">
        <label>Your name</label>
        <input type="text" name="name" required placeholder="e.g. John">
        <label>Message</label>
        <textarea name="message" rows="3" required placeholder="Leave a message..."></textarea>
        <button type="submit">Submit</button>
    </form>

    <h2>Entries</h2>
    {% if entries %}
        {% for name, message, created_at in entries %}
        <div class="entry">
            <strong>{{ name }}</strong>
            <small> — {{ created_at.strftime('%d %b %Y, %H:%M') }}</small>
            <p>{{ message }}</p>
        </div>
        {% endfor %}
    {% else %}
        <p style="color:#999">No entries yet. Be the first!</p>
    {% endif %}
</body>
</html>
